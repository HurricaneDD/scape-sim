<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新日志-风光摄影模拟器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 80%;
            max-width: 800px;
            border: 2px solid black;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ccc;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-align: center;
        }
        .title-divider {
            display: none;
        }
        @media (orientation: portrait) {
            .title-divider {
                display: block;
            }
        }
        .header p {
            font-size: 1.1em;
            line-height: 1.5;
            margin: 10px 0;
        }
        .log-item {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .log-date {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }
        .log-content {
            line-height: 1.6;
            color: #555;
        }
        .log-content ul {
            margin: 0;
            padding-left: 20px;
        }
        .log-content li {
            margin: 8px 0;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 0.9em;
            color: #666;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 2px solid black;
            border-radius: 5px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                更新<span class="title-divider">
                </span>日志
            </h1>
            <div style="text-align: center;">
                <a href="index.html" class="back-link">返回主页</a>
            </div>
            <p>记录本项目的更新历史和功能变更。</p>
        </div>
        
        <div class="log-item">
            <div class="log-date">2026-04-19 17:00</div>
            <div class="log-content">
                <ul>
                    <li>创建更新日志页面</li>
                    <li>在主页添加"更新日志"按钮</li>
                </ul>
            </div>
        </div>
        
        <div class="footer">
            <p>此页面由Github Pages驱动，页面源码by Trae AI, HurricaneDD负责维护</p>
        </div>
    </div>
</body>
</html>
